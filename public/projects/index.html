    <span id="activity-title"></span> <br>
 <span id="activity-content"></span> <br>

<script type="text/javascript">
    async function typewriter(text, elementId, waitAfter) {
        var n = 0,
            isTag = false
        addText = "";
        const el = document.getElementById(elementId);

        const wait = () => new Promise(r => setTimeout(r, waitAfter));
        const nowait = () => new Promise(r => r());

        const render = () => el.innerHTML = (text.slice(0, n + 1) + addText);

        const cursor = document.createElement('span');
        cursor.id = "blink";

        el.style.setProperty("--cursor-visibility", "visible");
        while (n < text.length) {
            if (text.charAt(n + 1) === "<") isTag = true;
            if (text.charAt(n + 1) === ">") isTag = false;

            if (isTag) {
                n++;
                continue;
            }

            requestAnimationFrame(render);

            if (waitAfter === 0) {
                await nowait();
            } else {
                await wait();
            }

            n++;
        }
        el.style.setProperty("--cursor-visibility", "collapse");
    }

    function parseDelay(d) {
        const parsed = parseInt(d, 10);
        if (isNaN(parsed)) return 0;
        return parsed;
    }

    const titleDelay = parseDelay("0"),
        contentDelay = parseDelay("0");
    const typeeffetct = async () => {
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch1 id=\u0027title\u0027\u003eProjects\u003c\/h1\u003e\u003c\/span\u003e", "activity-title", titleDelay);
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch2 id=\u0022stock-boy-frontend-repohttpsgithubcomlathornestock-boy-backend-repohttpsgithubcomlathornestock-boy-functions\u0022\u003e\u003cstrong\u003eStock Boy\u003c\/strong\u003e (\u003ca href=\u0022https:\/\/github.com\/lathorne\/stock-boy\u0022\u003efrontend repo\u003c\/a\u003e, \u003ca href=\u0022https:\/\/github.com\/lathorne\/stock-boy-functions\u0022\u003ebackend repo\u003c\/a\u003e)\u003c\/h2\u003e\n\u003cp\u003eA progressive web app that pulls financial data directly from SEC filings and determines a percent confidence in the long-term growth of the stock based on the principles of good investing found in \u0026ldquo;Warren Buffett and the Interpretation of Financial Statements\u0026rdquo;. The goal was to make it easy for retail investors to invest using proper information.\u003c\/p\u003e\n\u003cp\u003eA user could search the PWA for a stock by name, ticker, or CIK. A table would then display ~25 markers for stock growth for that stock and use the scores of each marker to determine a percent confidence. The markers would display data for each year that could be retrieved from the SEC.\u003c\/p\u003e\n\u003cp\u003e\u003cstrong\u003eUses react.js, firebase, nosql, automation, and google cloud platform.\u003c\/strong\u003e\u003c\/p\u003e\n\u003ch2 id=\u0022self-playing-nintendo-switch-repohttpsgithubcomlathorneswsh-pokemon-breeder\u0022\u003e\u003cstrong\u003eSelf-Playing Nintendo Switch\u003c\/strong\u003e (\u003ca href=\u0022https:\/\/github.com\/lathorne\/swsh-pokemon-breeder\u0022\u003erepo\u003c\/a\u003e)\u003c\/h2\u003e\n\u003cp\u003eFirmware for automatically breeding shiny Pokemon using an Arduino. Forked from a project doing a similar thing for The Legend of Zelda: Breath of the Wild.\u003c\/p\u003e\n\u003cp\u003eCode for an Arduino to be treated like a controller for the Nintendo Switch. The Arduino is programmed for character movement and interaction on a loop. I would use it to breed Pokemon over night hoping for a shiny in the morning. This can be used for any simple, repetitive task in a Nintendo Switch game. For more info on how to use it, see the Github repo linked below.\u003c\/p\u003e\n\u003cp\u003e\u003cstrong\u003eUses arduino, automation, and firmware.\u003c\/strong\u003e\u003c\/p\u003e\n\u003c\/span\u003e", "activity-content", contentDelay);
        return;
    }

    typeeffetct()
</script>
