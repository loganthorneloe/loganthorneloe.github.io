<script type="text/javascript">
    async function typewriter(text, elementId, waitAfter) {
        var n = 0,
            isTag = false
        addText = "";
        const el = document.getElementById(elementId);

        const wait = () => new Promise(r => setTimeout(r, waitAfter));
        const nowait = () => new Promise(r => r());

        const render = () => el.innerHTML = (text.slice(0, n + 1) + addText);

        const cursor = document.createElement('span');
        cursor.id = "blink";

        el.style.setProperty("--cursor-visibility", "visible");
        while (n < text.length) {
            if (text.charAt(n + 1) === "<") isTag = true;
            if (text.charAt(n + 1) === ">") isTag = false;

            if (isTag) {
                n++;
                continue;
            }

            requestAnimationFrame(render);

            if (waitAfter === 0) {
                await nowait();
            } else {
                await wait();
            }

            n++;
        }
        el.style.setProperty("--cursor-visibility", "collapse");
    }

    function parseDelay(d) {
        const parsed = parseInt(d, 10);
        if (isNaN(parsed)) return 0;
        return parsed;
    }

    const titleDelay = parseDelay("0"),
        contentDelay = parseDelay("0");
    const typeeffetct = async () => {
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch1 id=\u0027title\u0027\u003eExperience\u003c\/h1\u003e\u003c\/span\u003e", "activity-title", titleDelay);
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch2 id=\u0022google-software-engineer\u0022\u003eGoogle, Software Engineer\u003c\/h2\u003e\n\u003cul\u003e\n\u003cli\u003eIdentify and fix inefficiencies in one of the world\u0026rsquo;s largest online machine learning training platforms to improve developer velocity.\u003c\/li\u003e\n\u003cli\u003eTrack training events and improve documentation to build a more accurate picture of the model training process and remove resource and time bottlenecks for clients.\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch2 id=\u0022microsoft-software-engineer\u0022\u003eMicrosoft, Software Engineer\u003c\/h2\u003e\n\u003cul\u003e\n\u003cli\u003eConnected AML Pipelines to new AML sharing service (C#, .NET). Enables machine learning pipelines to share ML assets across users easing ML development and iteration.\u003c\/li\u003e\n\u003cli\u003eCreated kubernetes microservice retooling Azure ML graph building to increase support for specific computes, models, and environments and decrease development time for adding features.\u003c\/li\u003e\n\u003cli\u003eWorked with customers to increase ease-of-use and decrease experimentation time and experiment setup.\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch2 id=\u0022byu-biomedical-imaging-research-group-machine-learning-research-scientist\u0022\u003eBYU Biomedical Imaging Research Group, Machine Learning Research Scientist\u003c\/h2\u003e\n\u003cul\u003e\n\u003cli\u003eExplored ML network feature space of U-Net segmentation network to better understand feature extraction and motivate robust ML segmentation techniques. Published results at an international conference receiving Magna Cum Laude Award (Top 15% of submissions)\u003c\/li\u003e\n\u003cli\u003eImplemented deep learning signal reconstruction algorithm to decrease MRI scan time and costs using Python and Tensorflow\u003c\/li\u003e\n\u003cli\u003eManaged a team of 5 engineers on NIH-funded research on the novel application of muscle activation detection via MRI\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch2 id=\u0022microsoft-software-engineer-intern\u0022\u003eMicrosoft, Software Engineer Intern\u003c\/h2\u003e\n\u003cul\u003e\n\u003cli\u003eDeveloped interceptor in Rust for heightened cloud security and memory-safe monitoring of Azure rack manager\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch2 id=\u0022los-alamos-national-lab-computational-physics-intern\u0022\u003eLos Alamos National Lab, Computational Physics Intern\u003c\/h2\u003e\n\u003cul\u003e\n\u003cli\u003eImplemented a scalable algorithm for Lagrangian hydrodynamic modeling in C\u002b\u002b\u003c\/li\u003e\n\u003cli\u003eDeveloped software using parallel computing methods to be efficiently run on supercomputing hardware\u003c\/li\u003e\n\u003cli\u003eApplied automated testing to improve reliability of software to be used by hundreds of researchers nationwide\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003c\/span\u003e", "activity-content", contentDelay);
        return;
    }

    typeeffetct()
