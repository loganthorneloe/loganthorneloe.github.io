name: Build and Deploy Static Site

on:
  push:
    branches:
      - main
  schedule:
    # Run daily at midnight UTC to fetch the latest Substack posts and GitHub stats
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual triggering from the Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run static site builder
        run: python build.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html projects.html articles.html cache.json
          # Check if there are any changes staged for commit, then commit and push
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update dynamic Substack posts and GitHub stats [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
